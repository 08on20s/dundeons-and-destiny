<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeons and Destiny</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=EB+Garamond&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --parchment: #f4e4bc; }
        body { background: #000; color: white; font-family: 'EB Garamond', serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #ledger { background: var(--parchment); color: #3e2723; padding: 20px; border-bottom: 2px solid var(--gold); }
        #viewport { height: 300px; background-size: cover; background-position: center; border-bottom: 2px solid var(--gold); background-image: url('https://image.pollinations.ai/prompt/dark-fantasy-tavern'); }
        #story { flex: 1; padding: 20px; overflow-y: auto; font-size: 1.2rem; }
        #controls { padding: 20px; background: #111; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; background: #222; color: white; border: 1px solid var(--gold); }
        button { background: #3e2723; color: var(--gold); border: 1px solid var(--gold); padding: 10px; cursor: pointer; font-family: 'Cinzel'; }
        #dice-tray { height: 80px; background: #000; display: flex; align-items: center; justify-content: center; gap: 20px; border-top: 2px solid var(--gold); }
    </style>
</head>
<body>

    <div id="ledger">
        <h2 style="font-family:'Cinzel'; margin:0;">Character Ledger</h2>
        <button onclick="rollStats()">Roll 2e Stats</button> <span id="stats-out"></span>
    </div>

    <div id="viewport"></div>
    <div id="story">
        <p>The Tavern is quiet. Select a path to begin:</p>
        <button onclick="start('Way of the Ninja')">Way of the Ninja</button>
        <button onclick="start('Wonders of Waterdeep')">Wonders of Waterdeep</button>
    </div>

    <div id="controls">
        <input type="text" id="userInput" placeholder="Type your action...">
        <button onclick="sendAction()">Act</button>
    </div>

    <div id="dice-tray">
        <button onclick="roll(20)">D20</button>
        <div id="dice-result" style="font-size: 2rem; color: var(--gold);">--</div>
        <button onclick="roll(6)">D6</button>
    </div>

    <script>
        // --- PASTE YOUR API KEY BETWEEN THE QUOTES BELOW ---
        const MY_KEY = 'AQ.Ab8RN6JZzXtsNpNMelMHS4hUbVHPNyT7u1-XzT4Z_0suT9rW-g'; 
        // --------------------------------------------------

        let currentPath = "";

        function roll(s) { document.getElementById('dice-result').innerText = Math.floor(Math.random()*s)+1; }
        
        function rollStats() {
            const s = ['STR','DEX','CON','INT','WIS','CHA'];
            let res = ""; s.forEach(x => res += x + ":" + (Math.floor(Math.random()*13)+5) + " ");
            document.getElementById('stats-out').innerText = res;
        }

        async function talkToAI(message) {
            if (MY_KEY.includes("PASTE_YOUR_KEY")) {
                alert("You forgot to paste your API Key into the code!");
                return;
            }

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${MY_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "You are an AD&D 2e DM. Path: " + currentPath + ". Action: " + message + ". Start with [IMAGE: scene description]" }] }] })
                });

                const data = await response.json();
                if (data.error) { alert("Google Error: " + data.error.message); return; }
                
                let text = data.candidates[0].content.parts[0].text;
                
                // Handle Image
                const img = text.match(/\[IMAGE:(.*?)\]/);
                if (img) {
                    document.getElementById('viewport').style.backgroundImage = `url('https://image.pollinations.ai/prompt/${encodeURIComponent(img[1])}-dark-fantasy-oil')`;
                    text = text.replace(img[0], '');
                }
                
                document.getElementById('story').innerHTML += `<p style="color:var(--gold)">> ${message}</p><p>${text}</p>`;
                document.getElementById('story').scrollTop = document.getElementById('story').scrollHeight;
            } catch (e) {
                alert("Connection Error. Check your internet and API key.");
            }
        }

        function start(p) { currentPath = p; document.getElementById('story').innerHTML = "Initializing " + p + "..."; talkToAI("Start the game."); }
        function sendAction() { const m = document.getElementById('userInput').value; talkToAI(m); document.getElementById('userInput').value = ""; }
    </script>
</body>
</html>
